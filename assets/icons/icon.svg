<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient - deep warm black -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A1917"/>
      <stop offset="100%" stop-color="#0C0B0A"/>
    </linearGradient>

    <!-- Accent gradient - champagne gold -->
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#D4B366"/>
      <stop offset="50%" stop-color="#C4A052"/>
      <stop offset="100%" stop-color="#9A7F42"/>
    </linearGradient>

    <!-- Subtle inner shadow -->
    <filter id="innerShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="blur" result="inverse"/>
      <feFlood flood-color="#000" flood-opacity="0.2" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>

    <!-- Outer glow for the orb -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle - machined bezel feel -->
  <circle cx="256" cy="256" r="248" fill="url(#bg)"/>

  <!-- Subtle outer ring -->
  <circle cx="256" cy="256" r="240" fill="none" stroke="#2A2825" stroke-width="1.5"/>

  <!-- Inner recessed area -->
  <circle cx="256" cy="256" r="180" fill="#0C0B0A"/>
  <circle cx="256" cy="256" r="178" fill="none" stroke="#1A1917" stroke-width="2"/>

  <!-- Central orb with glow - the indicator light -->
  <g filter="url(#glow)">
    <circle cx="256" cy="256" r="100" fill="url(#accent)"/>
  </g>

  <!-- Orb highlight - top left reflection -->
  <ellipse cx="230" cy="220" rx="50" ry="35" fill="rgba(255,255,255,0.25)" transform="rotate(-15 230 220)"/>

  <!-- Orb inner ring -->
  <circle cx="256" cy="256" r="100" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>

  <!-- Microphone icon - clean geometric -->
  <g transform="translate(256, 256)" fill="#141311">
    <!-- Mic body - rounded rectangle -->
    <rect x="-18" y="-45" width="36" height="58" rx="18" fill="#141311"/>

    <!-- Mic stand arc -->
    <path
      d="M -30 15 Q -30 48 0 48 Q 30 48 30 15"
      fill="none"
      stroke="#141311"
      stroke-width="5"
      stroke-linecap="round"
    />

    <!-- Stand vertical -->
    <line x1="0" y1="48" x2="0" y2="65" stroke="#141311" stroke-width="5" stroke-linecap="round"/>

    <!-- Base -->
    <line x1="-16" y1="65" x2="16" y2="65" stroke="#141311" stroke-width="5" stroke-linecap="round"/>
  </g>
</svg>
